name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: PatilRohit03
          outputs: |
            "dist/github-contribution-grid-snake.svg?color_snake=#c5a059&color_dots=#1a1c1e,#3b4252,#4c566a,#70a3c4,#88c0d0"
            "dist/github-contribution-grid-snake-dark.svg?color_snake=#c5a059&color_dots=#1a1c1e,#3b4252,#4c566a,#70a3c4,#88c0d0"

      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
