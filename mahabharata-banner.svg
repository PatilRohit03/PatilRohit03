<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Yatra+One&amp;family=Montserrat:wght@400;600&amp;display=swap');
      .title {
        font-family: 'Yatra One', serif;
        font-size: 36px;
        fill: url(#goldGradient);
        text-anchor: middle;
        letter-spacing: 3px;
        filter: drop-shadow(0px 4px 8px rgba(212, 175, 55, 0.4));
      }
      .subtitle {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #ff9933;
        text-anchor: middle;
        letter-spacing: 5px;
      }
      .motto {
        font-family: 'Yatra One', serif;
        font-size: 15px;
        fill: #f7f5f0;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .line {
        stroke: url(#goldGradient);
        stroke-width: 1.5;
        stroke-linecap: round;
      }
    </style>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="#0f0d0e" />
  
  <!-- Double Ornate Border -->
  <rect x="15" y="15" width="770" height="190" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.9" rx="6" />
  <rect x="20" y="20" width="760" height="180" fill="none" stroke="#800020" stroke-width="1" opacity="0.8" rx="4" />
  
  <!-- Content -->
  <text x="400" y="85" class="title">ROHIT KUMAR PATIL</text>
  
  <!-- Gandiva Bow and Arrow Vector Divider -->
  <path d="M 330,110 Q 400,95 470,110 M 400,90 L 400,125 M 392,110 L 408,110" stroke="#d4af37" stroke-width="2" fill="none" />
  <path d="M 328,110 Q 320,110 330,110 M 472,110 Q 480,110 470,110" stroke="#ff9933" stroke-width="1.5" fill="none" />
  
  <text x="400" y="150" class="subtitle">AI ENGINEER • FULL STACK DEVELOPER</text>
  <text x="400" y="180" class="motto">कर्मण्येवाधिकारस्ते मा फलेषु कदाचन</text>
</svg>
