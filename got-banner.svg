<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&amp;family=Cinzel:wght@500;700&amp;family=Montserrat:wght@300;500&amp;display=swap');
      .title {
        font-family: 'Cinzel Decorative', 'Cinzel', serif;
        font-size: 38px;
        font-weight: 700;
        fill: url(#goldGradient);
        text-anchor: middle;
        letter-spacing: 5px;
        filter: drop-shadow(0px 4px 8px rgba(197, 160, 89, 0.3));
      }
      .subtitle {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 500;
        fill: #a6c8e0;
        text-anchor: middle;
        letter-spacing: 6px;
      }
      .motto {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        font-weight: 500;
        fill: #c5a059;
        text-anchor: middle;
        letter-spacing: 4px;
        font-style: italic;
      }
      .line {
        stroke: url(#goldGradient);
        stroke-width: 1.5;
        stroke-linecap: round;
      }
    </style>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B3E" />
      <stop offset="50%" stop-color="#C5A059" />
      <stop offset="100%" stop-color="#F3E5AB" />
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="#0d0d0d" />
  
  <!-- Border -->
  <rect x="15" y="15" width="770" height="190" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8" rx="4" />
  
  <!-- Content -->
  <text x="400" y="95" class="title">ROHIT KUMAR PATIL</text>
  
  <!-- Decorative Line -->
  <line x1="260" y1="120" x2="540" y2="120" class="line" />
  <polygon points="400,117 403,120 400,123 397,120" fill="#C5A059" />
  
  <text x="400" y="150" class="subtitle">AI ENGINEER • FULL STACK DEVELOPER</text>
  <text x="400" y="180" class="motto">WINTER IS CODING</text>
</svg>
